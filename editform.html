<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Scheme Review</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f3f4f6;
            font-family: "Segoe UI";
        }

        .panel {
            background: #fff;
            padding: 22px;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            width: 70%;
        }
.preview-value label {
  margin-bottom: 4px;
  display: block;
}
        .preview-card {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .preview-header {
            background: #f3f4f6;
            padding: 10px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .preview-row {
            display: flex;
            border-top: 1px solid #e5e7eb;
        }

        .preview-label {
            width: 40%;
            padding: 10px;
            background: #f9fafb;
        }

        .preview-value {
            width: 60%;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="container d-flex justify-content-center mt-4">
        <div class="panel">

            <div id="livePreviewContainer"></div>

            <div class="d-flex justify-content-center gap-2 mt-3">
                <button class="btn btn-secondary btn-sm" onclick="handleSaveDraftUpdate()">Save as Draft</button>
                <button class="btn btn-primary btn-sm" onclick="handleUpdate()">Update</button>
            </div>

        </div>
    </div>

    <script>
    const ALL_STATES = [
        "Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa",
        "Gujarat", "Haryana", "Himachal Pradesh", "Jammu and Kashmir", "Jharkhand",
        "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", "Meghalaya",
        "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu",
        "Telangana", "Tripura", "Uttarakhand", "Uttar Pradesh", "West Bengal",
        "Andaman and Nicobar Islands", "Chandigarh",
        "Dadra & Nagar Haveli and Daman & Diu", "Delhi", "Lakshadweep",
        "Puducherry", "Ladakh"
    ];
        /* =========================
           STORAGE CONFIG
        ========================= */
        const STORAGE_KEY = "schemeFormData";

        /* =========================
           DEFAULT DATA
        ========================= */
        const defaultData = {
            "schemeName": "Industrial Growth Incentive Scheme",
            "schemeDescription": "Provides financial and infrastructure support for industrial expansion across multiple states.",
            "stateDetails": [
                {
                    "name": "Gujarat",
                    "budget": "125",
                    "kpi": "3243"
                },
                {
                    "name": "Maharashtra",
                    "budget": "200",
                    "kpi": "90"
                },
                {
                    "name": "Karnataka",
                    "budget": "150",
                    "kpi": "120"
                }
            ],
            "budget": "10000000",
            "ministry": "Ministry of Heavy Industries",
            "sector": "921",
            "subSector": "S3",
            "isHighLight": false,
            "fields": [
                {
                    "name": "Beneficiary Name",
                    "type": "text",
                    "mandatory": false,
                    "value": "ABC Industries Pvt Ltd",
                    "options": [],
                    "section": "basicSection",
                    "isHighLight": false
                },
                {
                    "name": "Number of Employees",
                    "type": "number",
                    "mandatory": false,
                    "value": "150",
                    "options": [],
                    "section": "basicSection",
                    "isHighLight": false
                },
                {
                    "name": "Registration Date",
                    "type": "date",
                    "mandatory": false,
                    "value": "2025-12-15",
                    "options": [],
                    "section": "basicSection",
                    "isHighLight": false
                },
                {
                    "name": "Business Type",
                    "type": "dropdown",
                    "mandatory": false,
                    "value": "Manufacturing",
                    "options": [
                        "Manufacturing",
                        "Service",
                        "Trading"
                    ],
                    "section": "basicSection",
                    "isHighLight": false
                },
                {
                    "name": "Is MSME Registered",
                    "type": "radio",
                    "mandatory": false,
                    "value": "Yes",
                    "options": [
                        "Yes",
                        "No"
                    ],
                    "section": "basicSection",
                    "isHighLight": false
                },
                {
                    "name": "Applicable Benefits",
                    "type": "checkbox",
                    "mandatory": false,
                    "value": [
                        "Subsidy",
                        "Loan Support"
                    ],
                    "options": [
                        "Tax Exemption",
                        "Subsidy",
                        "Loan Support"
                    ],
                    "section": "basicSection",
                    "isHighLight": false
                },
                {
                    "name": "Attached Document",
                    "type": "file",
                    "mandatory": false,
                    "value": "registration-certificate.pdf",
                    "options": [],
                    "section": "basicSection",
                    "isHighLight": false
                },
                {
                    "name": "Quarter",
                    "type": "dropdown",
                    "value": "Q1",
                    "options": ["Q1", "Q2", "Q3", "Q4"],
                    "section": "FinancialDetails"
                },
                {
                    "name": "Project Name",
                    "type": "text",
                    "mandatory": false,
                    "value": "Solar Plant Expansion",
                    "options": [],
                    "section": "FinancialDetails",
                    "isHighLight": false
                },
                {
                    "name": "Total Investment",
                    "type": "number",
                    "mandatory": false,
                    "value": "2500000",
                    "options": [],
                    "section": "FinancialDetails",
                    "isHighLight": false
                },
                {
                    "name": "Start Date",
                    "type": "date",
                    "mandatory": false,
                    "value": "2026-04-01",
                    "options": [],
                    "section": "FinancialDetails",
                    "isHighLight": false
                },
                {
                    "name": "Attached Document",
                    "type": "file",
                    "mandatory": false,
                    "value": "dummy-pdf_2.pdf",
                    "options": [],
                    "section": "FinancialDetails",
                    "isHighLight": false
                },
                 {
                    "name": "Quarter",
                    "type": "dropdown",
                    "value": "Q2",
                    "options": ["Q1", "Q2", "Q3", "Q4"],
                    "section": "KPIMetrics"
                },
                {
                    "name": "Performance Rating",
                    "type": "dropdown",
                    "mandatory": false,
                    "value": "Excellent",
                    "options": [
                        "Poor",
                        "Average",
                        "Good",
                        "Very Good",
                        "Excellent"
                    ],
                    "section": "KPIMetrics",
                    "isHighLight": false
                },
                {
                    "name": "Approval Status",
                    "type": "radio",
                    "mandatory": false,
                    "value": "Approved",
                    "options": [
                        "Pending",
                        "Approved",
                        "Rejected"
                    ],
                    "section": "KPIMetrics",
                    "isHighLight": false
                },
                {
                    "name": "Facilities Provided",
                    "type": "checkbox",
                    "mandatory": false,
                    "value": [
                        "Funding",
                        "Training"
                    ],
                    "options": [
                        "Funding",
                        "Training",
                        "Infrastructure",
                        "Mentorship"
                    ],
                    "section": "Others",
                    "isHighLight": false
                },
                {
                    "name": "Remarks",
                    "type": "text",
                    "mandatory": false,
                    "value": "Project meets all eligibility criteria and shows strong growth potential.",
                    "options": [],
                    "section": "Others",
                    "isHighLight": false
                }
            ]
        };

        /* =========================
           STATE
        ========================= */
        let formData = loadFromStorage();
        let tempFormData = deepClone(formData);

        /* =========================
           HELPERS
        ========================= */
        function deepClone(obj) {
            return JSON.parse(JSON.stringify(obj));
        }

        function loadFromStorage() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : deepClone(defaultData);
        }

        function saveToStorage(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        const formatHeading = t => t.replace(/([A-Z])/g, ' $1');

        /* =========================
           RENDER INPUT
        ========================= */
        function renderInput(f, i) {

            switch (f.type) {

                case "text":
                case "number":
                case "date":
                    return `<input class="form-control form-control-sm"
    value="${f.value || ''}"
    ${f.readOnly ? 'readonly style="background:#e9ecef;"' : ''}
    onchange="updateField(${i}, this.value)">`;

                case "dropdown":
                    return `<select class="form-select form-select-sm"
                onchange="updateField(${i}, this.value)">
                ${f.options.map(o => `
                    <option ${o === f.value ? 'selected' : ''}>${o}</option>
                `).join('')}
            </select>`;

                case "checkbox":
                    return f.options.map(o => `
                <label class="me-2">
                    <input type="checkbox"
                        ${f.value?.includes(o) ? 'checked' : ''}
                        onchange="updateCheckbox(${i}, '${o}', this)">
                    ${o}
                </label>
            `).join('');

                case "radio":
                    return f.options.map(o => `
                <label class="me-2">
                    <input type="radio" name="r_${i}"
                        ${f.value === o ? 'checked' : ''}
                        onchange="updateField(${i}, '${o}')">
                    ${o}
                </label>
            `).join('');

                case "file":
                    return `
                <input type="file" class="form-control form-control-sm"
                    onchange="updateFile(${i}, this)">
                <small>${f.value || ''}</small>
            `;

                default:
                    return f.value || '-';
            }
        }

        /* =========================
           RENDER UI
        ========================= */
        function renderUI() {

   let html = `
<div class="preview-card">
  <div class="preview-header">Basic Details</div>
  ${rowInput("Scheme", "schemeName")}
  ${rowInput("Description", "schemeDescription")}
  ${renderStateRows()}
  ${rowInput("Budget", "budget")}
</div>
`;

            let grouped = {};

            tempFormData.fields.forEach((f, i) => {
                if (!grouped[f.section]) grouped[f.section] = [];
                grouped[f.section].push({ f, i });
            });

           const sectionOrder = [
                "basicSection",
                "FinancialDetails",
                "KPIMetrics",
                "Others"
            ];

            sectionOrder.forEach(sec => {
                if (!grouped[sec]) return;

                html += `
        <div class="preview-card">
            <div class="preview-header">${formatHeading(sec)}</div>
            ${grouped[sec].map(x => `
                <div class="preview-row">
                    <div class="preview-label">${x.f.name}</div>
                    <div class="preview-value">${renderInput(x.f, x.i)}</div>
                </div>
            `).join('')}
        </div>`;
            });

            document.getElementById("livePreviewContainer").innerHTML = html;
        }

        function rowInput(label, key, isArray = false) {
            const value = isArray
                ? tempFormData[key].join(', ')
                : tempFormData[key];

            return `
    <div class="preview-row">
        <div class="preview-label">${label}</div>
        <div class="preview-value">
            <input class="form-control form-control-sm"
                value="${value || ''}"
                onchange="updateBasic('${key}', this.value, ${isArray})">
        </div>
    </div>`;
        }

        /* =========================
           UPDATE (TEMP STATE)
        ========================= */
        function updateField(i, val) {
            tempFormData.fields[i].value = val;
        }

        function updateCheckbox(i, val, el) {
            let arr = tempFormData.fields[i].value || [];

            if (el.checked) {
                if (!arr.includes(val)) arr.push(val);
            } else {
                arr = arr.filter(v => v !== val);
            }

            tempFormData.fields[i].value = arr;
        }

        function updateFile(i, el) {
            const file = el.files[0];
            if (file) tempFormData.fields[i].value = file.name;
        }

        function updateBasic(key, val, isArray) {
            tempFormData[key] = isArray
                ? val.split(',').map(v => v.trim())
                : val;
        }

        /* =========================
           ACTIONS
        ========================= */
        function handleUpdate() {

            // commit changes
            formData = deepClone(tempFormData);

            // save to localStorage
            saveToStorage(formData);

            console.log("Saved:", formData);
            alert("Scheme updated successfully ✅");
            window.location.href = "https://www.figma.com/proto/eIUrGhDQoOaGgburEGwHlT/SMG?node-id=264-4262&t=aRX6xEC4PNxRmAis-0&scaling=scale-down-width&content-scaling=fixed&starting-point-node-id=264%3A4097&page-id=0%3A1&hide-ui=1"
        }

          function handleSaveDraftUpdate() {

                // commit changes
                formData = deepClone(tempFormData);

                // save to localStorage
                saveToStorage(formData);

                console.log("Saved:", formData);
                alert("Scheme draft saved successfully ✅");
            }

        function handleCancel() {
            tempFormData = deepClone(formData);
            renderUI();
        }

        /* =========================
           MODAL (UNCHANGED)
        ========================= */

        /* =========================
           INIT
        ========================= */
       window.onload = function () {
            ensureServedKPI();   // ✅ add field
             ensureFinancialFields();  
            renderUI();          // ✅ then render
        };
  function ensureServedKPI() {

        // 👉 Remove existing KPI fields (if already added before)
        tempFormData.fields = tempFormData.fields.filter(
            f => !(f.section === "KPIMetrics" &&
                (f.name === "Served KPI" || f.name === "Total KPI"))
        );

        // 👉 Find Approval Status index
        const approvalIndex = tempFormData.fields.findIndex(
            f => f.section === "KPIMetrics" && f.name === "Approval Status"
        );

        if (approvalIndex === -1) return;

        // 👉 Insert in correct order
     tempFormData.fields.splice(approvalIndex + 1, 0,

          {
              name: "Total KPI",
              type: "number",
              value: "100",
              section: "KPIMetrics",
              readOnly: true
          },

          {
              name: "Served KPI",
              type: "number",
              value: "50",
              section: "KPIMetrics"
          }
      );
    }
    function ensureFinancialFields() {
        const hasQuarter = tempFormData.fields.some(
            f => f.name === "Quarter" && f.section === "FinancialDetails"
        );
            const hasAllocated = tempFormData.fields.some(
                f => f.name === "Allocated Budget" && f.section === "FinancialDetails"
            );

            const hasUtilized = tempFormData.fields.some(
                f => f.name === "Utilized Budget" && f.section === "FinancialDetails"
            );

            // 👉 find index of "Attached Document" in FinancialDetails
            const attachIndex = tempFormData.fields.findIndex(
                f => f.section === "FinancialDetails" && f.name === "Attached Document"
            );

            if (attachIndex === -1) return; // safety

            // 👉 insert Utilized first (so order stays correct after next insert)
          if (!hasQuarter) {
            tempFormData.fields.splice(attachIndex, 0, {
                name: "Quarter",
                type: "dropdown",
                value: "Q1",
                options: ["Q1", "Q2", "Q3", "Q4"],
                section: "FinancialDetails"
            });
        }

        // 👉 insert Allocated above
        if (!hasAllocated) {
            tempFormData.fields.splice(attachIndex, 0, {
                name: "Allocated Budget",
                type: "number",
                mandatory: false,
                value: "2500000",
                section: "FinancialDetails",
                readOnly: true
            });
        }

        // 👉 insert Utilized
        if (!hasUtilized) {
            tempFormData.fields.splice(attachIndex, 0, {
                name: "Utilized Budget",
                type: "number",
                mandatory: false,
                value: "0",
                section: "FinancialDetails"
            });
        }
        }
        function renderStateRows() {
                const states = tempFormData.stateDetails || [];

                return `
                        <div class="preview-row">
                        <div class="preview-label">States</div>
                        <div class="preview-value">

                            ${states.map((s, i) => `
                            <div style="border:1px solid #eee; padding:8px; margin-bottom:6px; border-radius:6px;">
                                
                               <div style="display:flex; gap:10px; flex-wrap:wrap;">

  <div style="flex:1;">
    <label style="font-size:12px;">State</label>
    <select class="form-select form-select-sm"
      onchange="updateState(${i}, 'name', this.value)">
      <option value="">Select State</option>
      ${getStateOptions(s.name)}
    </select>
  </div>

  <div style="flex:1;">
    <label style="font-size:12px;">Budget</label>
    <input class="form-control form-control-sm"
      type="number"
      value="${s.budget || ''}"
      onchange="updateState(${i}, 'budget', this.value)">
  </div>

  <div style="flex:1;">
    <label style="font-size:12px;">KPI</label>
    <input class="form-control form-control-sm"
      type="number"
      value="${s.kpi || ''}"
      onchange="updateState(${i}, 'kpi', this.value)">
  </div>

  ${i !== 0 ? `
    <div style="display:flex; align-items:end;">
      <button class="btn btn-sm btn-danger"
        onclick="removeState(${i})">✖</button>
    </div>
  ` : ''}

</div>

                            </div>
                            `).join('')}

                            <div style="text-align:right;">
                            <button class="btn btn-primary btn-sm"
                                onclick="addState()">➕ Add State</button>
                            </div>

                        </div>
                        </div>
                    `;
            }
            function updateState(index, key, value) {
                    tempFormData.stateDetails[index][key] = value;
                }

                function addState() {
                    if (!tempFormData.stateDetails) tempFormData.stateDetails = [];

                    tempFormData.stateDetails.push({
                        name: '',
                        budget: '',
                        kpi: ''
                    });

                    renderUI();
                }

                function removeState(index) {
                    tempFormData.stateDetails.splice(index, 1);
                    renderUI();
                }
              function getStateOptions(selected = "") {
                    return ALL_STATES.map(state => `
                        <option value="${state}" ${state === selected ? "selected" : ""}>
                        ${state}
                        </option>
                    `).join("");
                }
    </script>

</body>

</html>
