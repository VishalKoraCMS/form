<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Scheme Form Builder</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <style>
      body {
        background: linear-gradient(135deg, #eef2f7, #f8fafc);
        font-family: "Segoe UI", sans-serif;
        color: #1f2937;
      }

      .layout {
        display: block;
        gap: 24px;
      }

      .preview-value table {
  font-size: 13px;
}
      .panel {
        background: #fff;
        padding: 22px;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        width: 60%;
        max-height: 92vh;
        overflow-y: auto;
      }

      h2 {
        font-size: 20px;
        margin-bottom: 18px;
      }

      h3 {
        font-size: 16px;
        margin-bottom: 8px;
      }

      label {
        font-size: 13px;
        margin-top: 12px;
        color: #6b7280;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        background: #f9fafb;
        margin-top: 6px;
      }

      input:focus,
      select:focus {
        background: #fff;
        border-color: #0d6efd;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        outline: none;
      }

      .section-box {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 16px;
        margin-top: 20px;
        background: #fff;
      }

      .section-title {
        font-weight: 600;
        margin-bottom: 10px;
        border-left: 4px solid #0d6efd;
        padding-left: 10px;
      }

      .basic-btn {
        display: flex;
        justify-content: flex-end;
        margin-right: 18px;
      }

      .add-btn {
        display: flex;
        justify-content: flex-end;
        margin-top: 10px;
      }

      .field-card {
        border: 1px solid #e5e7eb;
        padding: 14px;
        margin-top: 12px;
        border-radius: 8px;
        background: #f9fafb;
        position: relative;
      }

      .remove-btn {
        position: absolute;
        right: 10px;
        top: 8px;
        cursor: pointer;
        color: #9ca3af;
      }

      /* CUSTOM CHECKBOX */
      .custom-check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }

      .custom-check input {
        width: 16px;
        height: 16px;
        cursor: pointer;
        accent-color: #0d6efd;
      }

      .custom-check label {
        margin: 0;
        font-size: 13px;
        cursor: pointer;
      }

      .btn-custom {
        background: #0d6efd;
        color: #fff;
        border-radius: 8px;
        padding: 6px 14px;
      }

      .btn-custom:hover {
        border: 1px solid #0d6efd;
        color: #0d6efd;
      }

      .btn-draft {
        background: #e5e7eb;
        color: #374151;
      }

      .btn-save {
        background: #111827;
        color: #fff;
      }

      .preview-section {
        border: 1px solid #e5e7eb;
        padding: 12px;
        border-radius: 8px;
        background: #f9fafb;
        margin-bottom: 12px;
      }

      .preview-card {
        border: 1px solid #d1d5db;
        border-radius: 6px;
        overflow: hidden;
        margin-bottom: 16px;
        background: #fff;
      }

      .preview-header {
        background: #f3f4f6;
        padding: 10px 14px;
        font-weight: 600;
        font-size: 14px;
        border-bottom: 1px solid #d1d5db;
      }

      .preview-row {
        display: flex;
        border-bottom: 1px solid #e5e7eb;
      }

      .preview-row:last-child {
        border-bottom: none;
      }

      .preview-label {
        width: 40%;
        padding: 10px 14px;
        background: #f9fafb;
        font-weight: 500;
      }

      .preview-value {
        width: 60%;
        padding: 10px 14px;
      }

      .action-buttons {
        display: none;
        gap: 10px;
        margin-top: 10px;
      }

      .pill-btn {
        padding: 2px 10px;
        font-size: 12px;
        border-radius: 50px;
        border: 1px solid #ccc;
        background-color: #f8f9fa;
        cursor: pointer;
        transition: 0.2s;
      }

      .pill-btn:hover {
        background-color: #e2e6ea;
      }

      .pill-btn.primary {
        border-color: #0d6efd;
        color: #0d6efd;
      }

      .pill-btn.secondary {
        border-color: #6c757d;
        color: #6c757d;
      }

      .choices__list--multiple .choices__item {
        background-color: var(--choices-primary-color, #3d8bfd) !important;
        border: 1px solid
          color-mix(
            in srgb,
            var(--choices-primary-color, #0d6efd) 95%,
            var(--choices-darken, black)
          ) !important;
      }
    </style>
  </head>

    <script>
      var stateRowCounter = 0;
      const sectionNames = ["Financial Details", "KPI Metrics", "Others"];
      let fieldCounter = 0;
      const sectionsDiv = document.getElementById("sections");

      sectionNames.forEach((section) => {
        const id = section.replace(/\s/g, "");

        sectionsDiv.insertAdjacentHTML(
          "beforeend",
          `
    <div class="section-box">
      <div class="section-title">${section}</div>
      <div id="${id}"></div>
      <div class="add-btn">
        <button class="btn btn-primary btn-sm" onclick="addField('${id}')">➕ Add Field</button>
      </div>
    </div>
  `,
        );
      });

      function addField(sectionId) {
        fieldCounter++;

        const html = `
    <div class="field-card" data-section="${sectionId}" id="field-${fieldCounter}">
      <span class="remove-btn" onclick="this.parentElement.remove(); updatePreview()">✖</span>

      <label>Field Name</label>
      <input type="text" id="name-${fieldCounter}" oninput="updatePreview()">

      <label>Field Type</label>
      <select id="type-${fieldCounter}" onchange="renderInput(${fieldCounter})">
        <option value="text">Text</option>
        <option value="number">Number</option>
        <option value="date">Date</option>
        <option value="dropdown">Dropdown</option>
        <option value="radio">Radio</option>
        <option value="checkbox">Checkbox</option>
        <option value="file">File Upload</option>
      </select>

      <div class="custom-check">
        <input type="checkbox" id="mandatory-${fieldCounter}">
        <label for="mandatory-${fieldCounter}">Mandatory</label>
      </div>
  <label>Field Value</label>
      <div id="value-${fieldCounter}"></div>
      <div id="options-${fieldCounter}" style="display:none;"></div>
    </div>
  `;

        document
          .getElementById(sectionId)
          .insertAdjacentHTML("beforeend", html);
        renderInput(fieldCounter);
      }

      function formatHeading(text) {
        return text
          .replace(/([A-Z])/g, " $1")
          .replace(/^./, (s) => s.toUpperCase());
      }

      function renderInput(id) {
        const type = document.getElementById(`type-${id}`).value;
        const valueDiv = document.getElementById(`value-${id}`);
        const optionsDiv = document.getElementById(`options-${id}`);
        const nameInput = document.getElementById(`name-${id}`);

        optionsDiv.style.display = "none";
        if (type === "file") {
          nameInput.value = "Attached Document";
        }
        if (type === "text" || type === "number" || type === "date") {
          valueDiv.innerHTML = `<input type="${type}" id="val-${id}" oninput="updatePreview()">`;
        } else if (type === "file") {
          valueDiv.innerHTML = `<input type="file" id="val-${id}" onchange="updatePreview()">`;
        } else {
          valueDiv.innerHTML = `<div id="input-${id}"></div>`;
          optionsDiv.style.display = "block";
          optionsDiv.innerHTML = `
      <label>Options</label>
      <div id="option-list-${id}"></div>
      <button class="btn btn-primary btn-sm mt-1" onclick="addOption(${id})">Add Option</button>
    `;
        }

        updatePreview();
      }

      function addOption(id) {
        document
          .getElementById(`option-list-${id}`)
          .insertAdjacentHTML(
            "beforeend",
            `<input type="text" placeholder="Option" oninput="updateOptions(${id})">`,
          );
      }

      function updateOptions(id) {
        const type = document.getElementById(`type-${id}`).value;
        const inputs = document.querySelectorAll(`#option-list-${id} input`);
        const container = document.getElementById(`input-${id}`);

        container.innerHTML = "";

        inputs.forEach((input) => {
          if (input.value) {
            if (type === "dropdown") {
              container.innerHTML += `<option>${input.value}</option>`;
            } else {
              container.innerHTML += `
          <div class="custom-check">
            <input type="${type}" name="val-${id}" value="${input.value}" onchange="updatePreview()">
            <label>${input.value}</label>
          </div>
        `;
            }
          }
        });

        if (type === "dropdown") {
          container.innerHTML = `<select id="val-${id}" oninput="updatePreview()">${container.innerHTML}</select>`;
        }

        updatePreview();
      }
  function updatePreview() {
    const preview = document.getElementById("previewContainer");

    /* ================= STATE TABLE ================= */
   let stateHTML = '';
    const rows = document.querySelectorAll('[id^="state-row-"]');

    if (rows.length > 0) {
      stateHTML += `
    <div class="preview-card">
      <div class="preview-header">State-wise Details</div>

      <div class="preview-row">
        <div class="preview-label">States</div>
        <div class="preview-value">
          <table style="width:100%; border-collapse:collapse;">
            <tr style="background:#f3f4f6;">
              <th style="padding:6px; border:1px solid #ddd;">State</th>
              <th style="padding:6px; border:1px solid #ddd;">Budget</th>
              <th style="padding:6px; border:1px solid #ddd;">KPI</th>
            </tr>
  `;

      rows.forEach(row => {
        const id = row.id.split('-')[2];

        const name = document.getElementById(`state-${id}`)?.value || '-';
        const budgetVal = document.getElementById(`budget-${id}`)?.value || '-';
        const kpiVal = document.getElementById(`kpi-${id}`)?.value || '-';

        if (!name && !budgetVal && !kpiVal) return;

        stateHTML += `
      <tr>
        <td style="padding:6px; border:1px solid #ddd;">${name}</td>
        <td style="padding:6px; border:1px solid #ddd;">${budgetVal}</td>
        <td style="padding:6px; border:1px solid #ddd;">${kpiVal}</td>
      </tr>
    `;
      });

      stateHTML += `
          </table>
        </div>
      </div>
    </div>
  `;
    }

    /* ================= BASIC DETAILS ================= */
    let basicHTML = `
    <div class="preview-card">
      <div class="preview-header">Basic Details</div>

      <div class="preview-row">
        <div class="preview-label">Scheme Name</div>
        <div class="preview-value">${schemeName.value || "-"}</div>
      </div>

      <div class="preview-row">
        <div class="preview-label">Scheme Description</div>
        <div class="preview-value">${schemeDescription.value || "-"}</div>
      </div>

      <div class="preview-row">
        <div class="preview-label">Budget</div>
        <div class="preview-value">${budget.value || "-"}</div>
      </div>

      <div class="preview-row">
        <div class="preview-label">Ministry</div>
        <div class="preview-value">${ministry.value || "-"}</div>
      </div>

      <div class="preview-row">
        <div class="preview-label">Sector</div>
        <div class="preview-value">${sector.selectedIndex >= 0 ? sector.options[sector.selectedIndex].text : "-"}</div>
      </div>

      <div class="preview-row">
        <div class="preview-label">Sub Sector</div>
        <div class="preview-value">${subSector.selectedIndex >= 0 ? subSector.options[subSector.selectedIndex].text : "-"}</div>
      </div>
    </div>
  `;

    /* ================= DYNAMIC FIELDS ================= */
    let grouped = {
      FinancialDetails: '',
      KPIMetrics: '',
      Others: '',
      basicSection: ''
    };

    document.querySelectorAll(".field-card").forEach(field => {
      const id = field.id.split('-')[1];
      const section = field.getAttribute("data-section");

      // skip state rows (important fix)
      if (field.id.startsWith("state-row")) return;

      const nameInput = document.getElementById(`name-${id}`);
      const name = nameInput ? nameInput.value : '';

      let value = '';
      const input = document.getElementById(`val-${id}`);

      if (input && input.value !== undefined) {
        if (input.type === "file") {
          value = input.files && input.files.length > 0
            ? input.files[0].name
            : '';
        } else {
          value = input.value || '';
        }
      }

      const radio = document.querySelector(`input[name="val-${id}"]:checked`);
      if (radio) value = radio.value;

      const checkboxes = document.querySelectorAll(`#input-${id} input[type=checkbox]:checked`);
      if (checkboxes.length) {
        value = Array.from(checkboxes).map(c => c.value).join(', ');
      }

      if (name) {
        grouped[section] += `
        <div class="preview-row">
          <div class="preview-label">${name}</div>
          <div class="preview-value">${value || '-'}</div>
        </div>
      `;
      }
    });

    /* ================= FINAL RENDER ================= */
    preview.innerHTML = basicHTML + stateHTML;

    for (let key in grouped) {
      if (grouped[key]) {
        preview.innerHTML += `
        <div class="preview-card">
          <div class="preview-header">${formatHeading(key)}</div>
          ${grouped[key]}
        </div>
      `;
      }
    }
  }
     
      function saveDraft() {
        const stateDetails = [];

        var formData = {
          schemeName: document.getElementById("schemeName").value,
          schemeDescription: document.getElementById("schemeDescription").value,
          budget: document.getElementById("budget").value,
          ministry: document.getElementById("ministry").value,
          sector: document.getElementById("sector").value,
          subSector: document.getElementById("subSector").value,
          fields: [],
        };

        document.querySelectorAll('[id^="state-row-"]').forEach(row => {
          const id = row.id.split('-')[2];

       if (document.getElementById(`state-${id}`)?.value) {
            stateDetails.push({
              name: document.getElementById(`state-${id}`).value,
              budget: document.getElementById(`budget-${id}`)?.value || '',
              kpi: document.getElementById(`kpi-${id}`)?.value || ''
            });
          }
        });

        formData.stateDetails = stateDetails;
        var allFields = document.querySelectorAll(".field-card");

        allFields.forEach(function (field) {
          var id = field.id.split("-")[1];
          var value = "";

          // 🔹 get value
          var input = document.getElementById("val-" + id);

          if (input) {
            if (input.type === "file") {
              value =
                input.files && input.files.length > 0
                  ? input.files[0].name
                  : "";
            } else {
              value = input.value;
            }
          }

          // radio
          var radio = document.querySelector(
            "input[name='val-" + id + "']:checked",
          );
          if (radio) value = radio.value;

          // checkbox
          var checkboxes = document.querySelectorAll(
            "#input-" + id + " input[type=checkbox]:checked",
          );
          if (checkboxes.length > 0) {
            value = [];
            checkboxes.forEach(function (c) {
              value.push(c.value);
            });
          }

          // 🔹 collect options
          var options = [];
          var optionInputs = document.querySelectorAll(
            "#option-list-" + id + " input",
          );
          if (optionInputs.length > 0) {
            optionInputs.forEach(function (opt) {
              if (opt.value) {
                options.push(opt.value);
              }
            });
          }

          formData.fields.push({
            name: document.getElementById("name-" + id).value,
            type: document.getElementById("type-" + id).value,
            mandatory:
              document.getElementById("mandatory-" + id)?.checked || false,
            value: value,
            options: options, // ✅ important
            section: field.getAttribute("data-section"),
          });
        });

        localStorage.setItem("schemeFormDraft", JSON.stringify(formData));

        console.log("Saved:", formData);
        alert("Scheme draft saved successfully 📝");
      }
      function saveFinal() {
        const stateDetails = [];

        document.querySelectorAll('[id^="state-row-"]').forEach(row => {
          const id = row.id.split('-')[2];

        if (document.getElementById(`state-${id}`)?.value) {
            stateDetails.push({
              name: document.getElementById(`state-${id}`).value,
              budget: document.getElementById(`budget-${id}`)?.value || '',
              kpi: document.getElementById(`kpi-${id}`)?.value || ''
            });
          }
        });
        var formData = {
          schemeName: document.getElementById("schemeName").value,
          schemeDescription: document.getElementById("schemeDescription").value,
          budget: document.getElementById("budget").value,
          ministry: document.getElementById("ministry").value,
          sector: document.getElementById("sector").value,
          subSector: document.getElementById("subSector").value,
          fields: [],
        };
        formData.stateDetails = stateDetails;
        var allFields = document.querySelectorAll(".field-card");

        allFields.forEach(function (field) {
          var id = field.id.split("-")[1];
          var value = "";

          // 🔹 get value
          var input = document.getElementById("val-" + id);

          if (input) {
            if (input.type === "file") {
              value =
                input.files && input.files.length > 0
                  ? input.files[0].name
                  : "";
            } else {
              value = input.value;
            }
          }

          // radio
          var radio = document.querySelector(
            "input[name='val-" + id + "']:checked",
          );
          if (radio) value = radio.value;

          // checkbox
          var checkboxes = document.querySelectorAll(
            "#input-" + id + " input[type=checkbox]:checked",
          );
          if (checkboxes.length > 0) {
            value = [];
            checkboxes.forEach(function (c) {
              value.push(c.value);
            });
          }

          // 🔹 collect options
          var options = [];
          var optionInputs = document.querySelectorAll(
            "#option-list-" + id + " input",
          );
          if (optionInputs.length > 0) {
            optionInputs.forEach(function (opt) {
              if (opt.value) {
                options.push(opt.value);
              }
            });
          }

          formData.fields.push({
            name: document.getElementById("name-" + id).value,
            type: document.getElementById("type-" + id).value,
            mandatory:
              document.getElementById("mandatory-" + id)?.checked || false,
            value: value,
            options: options, // ✅ important
            section: field.getAttribute("data-section"),
          });
        });

        localStorage.setItem("schemeFormDraft", JSON.stringify(formData));

        console.log("Saved:", formData);
        alert("Scheme submitted to selected states successfully ✅");
        window.location.href =
          "https://www.figma.com/proto/eIUrGhDQoOaGgburEGwHlT/SMG?node-id=291-5533&t=aRX6xEC4PNxRmAis-0&scaling=scale-down-width&content-scaling=fixed&starting-point-node-id=61%3A2&page-id=0%3A1&hide-ui=1"; // 👈 change this to your page
      }
